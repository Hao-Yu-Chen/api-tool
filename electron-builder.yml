appId: com.apitool.app
productName: API Tool
directories:
  buildResources: build
  output: release

files:
  - out/**/*

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.png

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.png

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: API Tool
